name: Build and tag

on:
  push:
    branches:
      - release-*
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    outputs:
      version: ${{ steps.create-or-update-tag.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Init Git
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "actions"
      
      - name: Manage deps
        run: |
          go get github.com/relekang/coredns-blocklist
          go generate
          go mod tidy

          git commit -a -m "Manage deps" || true
          git push || true

      - name: Build
        run: |
          go build

      - name: Create or Update Tag
        id: create-or-update-tag
        run: |
          branch_name=$(git rev-parse --abbrev-ref HEAD)
          tag_name=${branch_name:8}
          git tag -f "$tag_name"
          git push -f origin "$tag_name"

          echo "version=$tag_name" >> "$GITHUB_OUTPUT"

  test:
    needs:
      - build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Pull changes
        run: |
          git fetch || true
          git pull || true

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/build-push-action@v7
        with:
          context: ./
          load: true
          platforms: linux/amd64
          tags: test/coredns-test
          cache-from: type=gha,scope=testbuild
          cache-to: type=gha,mode=max,scope=testbuild
          outputs: type=image,compression=zstd
      
      - name: Test image
        id: test-it
        working-directory: it
        continue-on-error: true
        run: |
          set -euo pipefail

          mkdir certs
          openssl req -newkey rsa:4096 \
            -x509 \
            -sha256 \
            -days 3650 \
            -nodes \
            -out certs/certificate.crt \
            -keyout certs/privatekey.key \
            -subj "/C=US/ST=DUMMY/L=DUMMY/O=Security/OU=DUMMY/CN=localhost"
          
          docker compose up -d

          sleep 5s

          curl -f http://localhost:9000/metrics > /dev/null && echo "Metrics are working" || exit 1

          dig @localhost +short +tls-hostname=localhost +notls-ca +https example.org | grep "[[:alnum:]]" && echo "DNS over HTTPS is working" || exit 1
          dig @localhost +short +tls-hostname=localhost +notls-ca +tls example.org | grep "[[:alnum:]]" && echo "DNS over TLS is working" || exit 1

          dig @localhost +short +tls-hostname=localhost +notls-ca +tls example.net | grep "[[:alnum:]]" && exit 1 || echo "Blocklist is blocking"

          echo "success=true" >> "$GITHUB_OUTPUT"

      - name: Finalize test
        working-directory: it
        run: |
          docker compose logs || true

          if [[ "${{ steps.test-it.outputs.success }}" = "true" ]]; then
            echo "Test successful"
          else
            exit 1
          fi

  docker-build:
    needs: 
      - build
      - test
    runs-on: ${{ matrix.arch.os }}
    timeout-minutes: 30
    permissions:
      packages: write
    strategy:
      matrix:
        arch:
          - platform: linux/amd64
            os: ubuntu-latest
          - platform: linux/arm64
            os: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6

      - name: Pull changes
        run: |
          git fetch || true
          git pull || true

      - name: Prepare
        run: |
          platform=${{ matrix.arch.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ghcr.io/${{ github.repository }}
          flavor: |
            latest=false

      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/build-push-action@v7
        id: build
        with:
          context: ./
          push: true
          platforms: ${{ matrix.arch.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          tags: ghcr.io/${{ github.repository }}
          cache-from: type=gha,scope=build-${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=build-${{ env.PLATFORM_PAIR }}
          outputs: type=image,compression=zstd,push-by-digest=true,name-canonical=true

      - name: Export digest
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  docker-merge:
    needs: 
      - build
      - docker-build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ secrets.DOCKERHUB_USERNAME }}/coredns-slim
            ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.build.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.build.outputs.version }}
            type=semver,pattern={{major}},value=${{ needs.build.outputs.version }}

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/${{ github.repository }}@sha256:%s ' *)
